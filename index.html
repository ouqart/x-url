<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通報リスト・コントローラー</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #15202b; color: white; text-align: center; }
        .nav { position: sticky; top: 0; background: #1da1f2; display: flex; justify-content: space-around; padding: 12px; z-index: 1000; }
        .nav-item { cursor: pointer; font-weight: bold; font-size: 14px; padding: 5px 15px; border-radius: 20px; }
        .nav-item.active { background: white; color: #1da1f2; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .input-card { background: #192734; padding: 20px; border-radius: 15px; border: 1px solid #38444d; margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #38444d; background: #15202b; color: white; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { border: none; padding: 10px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .add-btn { background: #1da1f2; color: white; width: 100%; padding: 15px; font-size: 16px; }
        .del-btn { background: #e0245e; color: white; padding: 5px 12px; }
        .edit-btn { background: #17bf63; color: white; padding: 5px 12px; margin-right: 5px; }
        .save-btn { background: #ffffff; color: #15202b; padding: 5px 12px; margin-top: 5px; }
        .report-item { background: #192734; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #38444d; text-align: left; }
        .item-info { font-size: 11px; color: #8899a6; margin-bottom: 5px; }
        .item-url { font-size: 13px; color: #1da1f2; margin-bottom: 8px; word-break: break-all; }
        .edit-mode { display: none; margin-top: 10px; border-top: 1px dashed #38444d; padding-top: 10px; }
        #searchBar { border: 2px solid #1da1f2; margin-bottom: 20px; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div class="nav">
    <div id="nav-add" class="nav-item active" onclick="showPage('add')">追加</div>
    <div id="nav-list" class="nav-item" onclick="showPage('list')">リスト編集</div>
</div>

<div id="addPage" class="container">
    <div class="input-card">
        <input type="text" id="urlInput" placeholder="URL">
        <input type="text" id="nameInput" placeholder="ユーザー名">
        <input type="datetime-local" id="timeInput">
        <button id="addBtn" class="btn add-btn" onclick="checkAndSend()">登録</button>
    </div>
</div>

<div id="listPage" class="container" style="display:none;">
    <input type="text" id="searchBar" placeholder="名前・ID検索" oninput="renderReports()">
    <div id="reportList">読み込み中...</div>
</div>

<script>
    const apiURL = 'https://script.google.com/macros/s/AKfycbwNMIqyjChPN5ckansj4zEcv-fEF9G6jnIOrdopZTCLOMMSRH5pZTEpS4U7-7-IJG2s/exec';
    const SEP = '[SEP]';
    let currentLinks = [];

    function showPage(page) {
        document.getElementById('addPage').style.display = page === 'add' ? 'block' : 'none';
        document.getElementById('listPage').style.display = page === 'list' ? 'block' : 'none';
        document.getElementById('nav-add').classList.toggle('active', page === 'add');
        document.getElementById('nav-list').classList.toggle('active', page === 'list');
        if(page === 'list') loadReports();
    }

    function extractId(url) {
        const m = url.match(/(?:x|twitter)\.com\/(?:intent\/user\?screen_name=)?([^\/\?\s&]+)/);
        return m ? m[1] : '不明';
    }

    async function checkAndSend() {
        const url = document.getElementById('urlInput').value.trim();
        const name = document.getElementById('nameInput').value.trim();
        const time = document.getElementById('timeInput').value;
        const id = extractId(url);
        if(!url) return;

        // 同じURLの古いデータがあれば先に削除（重複防止）
        const oldData = currentLinks.find(l => l.url === url);
        if (oldData) await sendAction('delete', oldData.raw, null, true);

        if (name) await syncNamesById(id, name);
        const composite = `${url}${SEP}${name}${SEP}${id}${SEP}${time}`;
        sendAction('add', composite);
    }

    async function sendAction(type, value, oldRaw = null, silent = false) {
        if(!silent) document.body.classList.add('loading');
        try {
            if(type === 'update') {
                await fetch(`${apiURL}?action=delete&url=${encodeURIComponent(oldRaw)}`, { mode: 'no-cors' });
                await fetch(`${apiURL}?action=add&url=${encodeURIComponent(value)}`, { mode: 'no-cors' });
            } else {
                await fetch(`${apiURL}?action=${type}&url=${encodeURIComponent(value)}`, { mode: 'no-cors' });
            }
            if(!silent) { alert('完了'); loadReports(); }
        } catch (e) { if(!silent) alert('エラー'); }
        if(!silent) document.body.classList.remove('loading');
    }

    async function loadReports() {
        const res = await fetch(`${apiURL}?action=getReports`);
        const data = await res.json();
        currentLinks = data.map((raw, i) => {
            const p = raw.split(SEP);
            return { raw: raw, idx: i, url: p[0] || raw, name: p[1] || '', id: p[2] || extractId(p[0] || raw), time: p[3] || '' };
        }).sort((a, b) => (b.time && a.time) ? b.time.localeCompare(a.time) : b.idx - a.idx);
        renderReports();
    }

    function renderReports() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        const listDiv = document.getElementById('reportList');
        listDiv.innerHTML = '';
        currentLinks.forEach(d => {
            if (!d.name.toLowerCase().includes(q) && !d.id.toLowerCase().includes(q)) return;
            const item = document.createElement('div');
            item.className = 'report-item';
            item.innerHTML = `
                <div class="item-info">@${d.id} | ${d.time || '日時なし'}</div>
                <div style="font-weight:bold; font-size:14px; margin-bottom:5px;">${d.name || '(名前なし)'}</div>
                <div class="item-url">${d.url}</div>
                <div style="text-align:right;">
                    <button class="btn edit-btn" onclick="toggleEdit(${d.idx})">編集</button>
                    <button class="btn del-btn" onclick="sendAction('delete', '${d.raw.replace(/'/g, "\\'")}')">削除</button>
                </div>
                <div id="editBox-${d.idx}" class="edit-mode">
                    <input type="text" value="${d.name}" id="en-${d.idx}">
                    <input type="datetime-local" value="${d.time}" id="et-${d.idx}">
                    <button class="btn save-btn" onclick="saveEdit(${d.idx})">一括更新</button>
                </div>
            `;
            listDiv.appendChild(item);
        });
    }

    function toggleEdit(i) {
        const box = document.getElementById(`editBox-${i}`);
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    async function syncNamesById(targetId, newName) {
        const targets = currentLinks.filter(l => l.id === targetId && l.name !== newName);
        for (const item of targets) {
            const updatedRaw = `${item.url}${SEP}${newName}${SEP}${item.id}${SEP}${item.time}`;
            await fetch(`${apiURL}?action=delete&url=${encodeURIComponent(item.raw)}`, { mode: 'no-cors' });
            await fetch(`${apiURL}?action=add&url=${encodeURIComponent(updatedRaw)}`, { mode: 'no-cors' });
        }
    }

    async function saveEdit(i) {
        const d = currentLinks.find(l => l.idx === i);
        const n = document.getElementById(`en-${i}`).value;
        const t = document.getElementById(`et-${i}`).value;
        if (n !== d.name) await syncNamesById(d.id, n);
        sendAction('update', `${d.url}${SEP}${n}${SEP}${d.id}${SEP}${t}`, d.raw);
    }

    loadReports();
</script>
</body>
</html>
