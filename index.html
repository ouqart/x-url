<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者用コントローラー（一括清掃機能付）</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #15202b; color: white; text-align: center; }
        .nav { position: sticky; top: 0; background: #1da1f2; display: flex; justify-content: space-around; padding: 12px; z-index: 1000; border-bottom: 1px solid #38444d; }
        .nav-item { cursor: pointer; font-weight: bold; font-size: 14px; padding: 8px 15px; border-radius: 20px; }
        .nav-item.active { background: white; color: #1da1f2; }
        .container { width: 95%; max-width: 500px; margin: auto; padding: 10px; box-sizing: border-box; }
        .input-card { background: #192734; padding: 20px; border-radius: 15px; border: 1px solid #38444d; margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #38444d; background: #15202b; color: white; font-size: 14px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 10px; }
        .clean-btn { background: #e0245e; color: white; display: none; } /* 重複がある時だけ表示 */
        .add-btn { background: #1da1f2; color: white; }
        .report-item { background: #192734; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #38444d; text-align: left; }
        .item-id { font-weight: bold; font-size: 16px; color: #1da1f2; }
        .item-info { font-size: 11px; color: #8899a6; margin: 5px 0; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; }
    </style>
</head>
<body>

<div id="loader">スプレッドシートを最適化中...</div>

<div class="nav">
    <div class="nav-item active" id="n-add" onclick="showPage('add')">追加</div>
    <div class="nav-item" id="n-list" onclick="showPage('list')">リスト編集</div>
</div>

<div id="addPage" class="container">
    <div class="input-card">
        <input type="text" id="urlInput" placeholder="URLを入力">
        <input type="datetime-local" id="timeInput">
        <button class="btn add-btn" onclick="register()">登録</button>
    </div>
</div>

<div id="listPage" class="container" style="display:none;">
    <button id="cleanBtn" class="btn clean-btn" onclick="autoClean()">シート内の重複をすべて掃除する</button>
    <div id="reportList">読込中...</div>
</div>

<script>
    const apiURL = 'https://script.google.com/macros/s/AKfycbwNMIqyjChPN5ckansj4zEcv-fEF9G6jnIOrdopZTCLOMMSRH5pZTEpS4U7-7-IJG2s/exec';
    let db;
    let rawCloudUrls = []; // 重複を含む生のデータ

    const request = indexedDB.open("AdminDB", 35);
    request.onupgradeneeded = e => {
        const d = e.target.result;
        if (d.objectStoreNames.contains("meta")) d.deleteObjectStore("meta");
        d.createObjectStore("meta", { keyPath: "url" });
    };
    request.onsuccess = e => { db = e.target.result; loadCloudData(); };

    function showPage(p) {
        document.getElementById('addPage').style.display = p === 'add' ? 'block' : 'none';
        document.getElementById('listPage').style.display = p === 'list' ? 'block' : 'none';
        if(p === 'list') loadCloudData();
    }

    // 重複を自動検知して掃除する機能
    async function autoClean() {
        const counts = {};
        rawCloudUrls.forEach(u => counts[u] = (counts[u] || 0) + 1);
        const dupes = Object.keys(counts).filter(u => counts[u] > 1);

        if (dupes.length === 0) return alert("重複はありません");
        if (!confirm(`${dupes.length}件の重複URLが見つかりました。シートを掃除しますか？`)) return;

        document.getElementById('loader').style.display = 'flex';
        for (const url of dupes) {
            // 一旦全部消して、1個だけ登録し直す（これでシートが1行になる）
            await fetch(`${apiURL}?action=delete&url=${encodeURIComponent(url)}`, { mode: 'no-cors' });
            await fetch(`${apiURL}?action=add&url=${encodeURIComponent(url)}`, { mode: 'no-cors' });
        }
        alert("掃除が完了しました。");
        await loadCloudData();
        document.getElementById('loader').style.display = 'none';
    }

    async function register() {
        const url = document.getElementById('urlInput').value.trim();
        const time = document.getElementById('timeInput').value;
        if(!url) return;
        
        // 送信前に重複チェック（既にあるなら送信せず上書きのみ）
        const isDupe = rawCloudUrls.includes(url);
        if(!isDupe) await fetch(`${apiURL}?action=add&url=${encodeURIComponent(url)}`, { mode: 'no-cors' });

        const tx = db.transaction("meta", "readwrite");
        await tx.objectStore("meta").put({ url, id: url.split('/')[3] || "@不明", time, name: "" });
        
        alert(isDupe ? "手元の日時を更新しました" : "新規登録しました");
        document.getElementById('urlInput').value = "";
        loadCloudData();
    }

    async function loadCloudData() {
        const res = await fetch(`${apiURL}?action=getReports`);
        rawCloudUrls = await res.json();
        
        // 重複があるか確認してボタンを出す
        const hasDupe = new Set(rawCloudUrls).size !== rawCloudUrls.length;
        document.getElementById('cleanBtn').style.display = hasDupe ? 'block' : 'none';
        
        renderList();
    }

    async function renderList() {
        const listDiv = document.getElementById('reportList');
        const tx = db.transaction("meta", "readonly");
        const allLocal = await new Promise(r => {
            const arr = [];
            tx.objectStore("meta").openCursor().onsuccess = e => {
                const c = e.target.result; if(c){arr.push(c.value);c.continue();}else r(arr);
            };
        });

        listDiv.innerHTML = '';
        [...new Set(rawCloudUrls)].forEach(u => {
            const d = allLocal.find(l => l.url === u) || { url: u, id: "@不明", time: '' };
            const item = document.createElement('div');
            item.className = 'report-item';
            item.innerHTML = `<div class="item-id">${d.id}</div><div class="item-info">${d.time || '日時未設定'}</div><div style="font-size:10px;opacity:0.6">${u}</div>`;
            listDiv.appendChild(item);
        });
    }
</script>
</body>
</html>
