<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通報リスト・コントローラー</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #15202b; color: white; text-align: center; }
        .nav { position: sticky; top: 0; background: #1da1f2; display: flex; justify-content: space-around; padding: 12px; z-index: 1000; }
        .nav-item { cursor: pointer; font-weight: bold; font-size: 14px; padding: 5px 15px; border-radius: 20px; }
        .nav-item.active { background: white; color: #1da1f2; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        
        .input-card { background: #192734; padding: 20px; border-radius: 15px; border: 1px solid #38444d; margin-bottom: 20px; margin-top: 10px; }
        input { width: 90%; padding: 12px; border-radius: 10px; border: 1px solid #38444d; background: #15202b; color: white; font-size: 16px; margin-bottom: 15px; }
        
        .btn { border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .add-btn { background: #1da1f2; color: white; }
        .del-btn { background: #e0245e; color: white; margin-top: 10px; }
        
        .report-item { background: #192734; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #38444d; text-align: left; word-break: break-all; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div class="nav">
    <div id="nav-add" class="nav-item active" onclick="showPage('add')">追加</div>
    <div id="nav-list" class="nav-item" onclick="showPage('list')">削除・確認</div>
</div>

<div id="addPage" class="container">
    <div class="input-card">
        <p style="margin-top:0;">通報するツイートのURLを貼り付け</p>
        <input type="text" id="urlInput" placeholder="https://x.com/...">
        <button id="addBtn" class="btn add-btn" onclick="checkAndSend()">通報リストに追加する</button>
    </div>
    <p style="color: #8899a6; font-size: 12px;">※重複チェック機能付き</p>
</div>

<div id="listPage" class="container" style="display:none;">
    <h3>現在の通報リスト</h3>
    <div id="reportList">読み込み中...</div>
</div>

<script>
    const apiURL = 'https://script.google.com/macros/s/AKfycbwNMIqyjChPN5ckansj4zEcv-fEF9G6jnIOrdopZTCLOMMSRH5pZTEpS4U7-7-IJG2s/exec';

    // 💡 サーバー上の最新リストを保持する変数
    let currentLinks = [];

    function showPage(page) {
        document.getElementById('addPage').style.display = page === 'add' ? 'block' : 'none';
        document.getElementById('listPage').style.display = page === 'list' ? 'block' : 'none';
        document.getElementById('nav-add').classList.toggle('active', page === 'add');
        document.getElementById('nav-list').classList.toggle('active', page === 'list');
        if(page === 'list') loadReports();
    }

    // 💡 追加ボタンを押した時にまず重複をチェックする関数
    async function checkAndSend() {
        const input = document.getElementById('urlInput');
        const url = input.value.trim();
        if(!url) return alert('URLを入力してください');

        // 最新のリストに同じURLが含まれているかチェック
        if (currentLinks.includes(url)) {
            alert('⚠️ このリンクは既に追加されています！\n(重複しているため送信しません)');
            return; // ここで終了して送信させない
        }

        // 重複がなければ送信
        sendAction('add', url);
    }

    async function sendAction(type, urlValue) {
        const input = document.getElementById('urlInput');
        const url = urlValue || input.value.trim();
        if(!url) return alert('URLを入力してください');

        document.body.classList.add('loading');
        try {
            // mode: 'no-cors' だと成功したか判定できないため、念のため少し待つかリロード
            await fetch(`${apiURL}?action=${type}&url=${encodeURIComponent(url)}`, { mode: 'no-cors' });
            alert(type === 'add' ? '追加完了！' : '削除完了！');
            input.value = '';
            
            // 💡 追加/削除が終わったら手元のリストも更新する
            await loadReportsSilent(); 

            if(type === 'delete') loadReports();
        } catch (e) {
            alert('エラーが発生しました');
        }
        document.body.classList.remove('loading');
    }

    // 💡 画面には出さずに裏でリストを更新する
    async function loadReportsSilent() {
        try {
            const res = await fetch(`${apiURL}?action=getReports`);
            currentLinks = await res.json();
        } catch (e) {
            console.log("リストの事前読み込みに失敗しました");
        }
    }

    async function loadReports() {
        const listDiv = document.getElementById('reportList');
        listDiv.innerHTML = '読み込み中...';
        try {
            const res = await fetch(`${apiURL}?action=getReports`);
            currentLinks = await res.json(); // ここでも最新リストを保存
            listDiv.innerHTML = '';
            if(currentLinks.length === 0) { listDiv.innerHTML = '<p style="color:#8899a6;">リストは空です</p>'; return; }
            
            currentLinks.forEach(url => {
                const item = document.createElement('div');
                item.className = 'report-item';
                item.innerHTML = `
                    <div style="font-size:12px; margin-bottom:10px; color:#8899a6;">${url}</div>
                    <button class="btn del-btn" style="padding:8px; font-size:12px; width:auto;" onclick="sendAction('delete', '${url}')">このURLをリストから消す</button>
                `;
                listDiv.appendChild(item);
            });
        } catch (e) {
            listDiv.innerHTML = 'エラー：読み込めませんでした';
        }
    }

    // 💡 起動時に1回リストを読み込んでおく
    loadReportsSilent();
</script>
</body>
</html>
