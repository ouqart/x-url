<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>データクリーンアップ・コントローラー</title>
    <style>
        body { font-family: sans-serif; background: #15202b; color: white; text-align: center; padding: 50px; }
        .log-box { background: #192734; padding: 20px; border-radius: 10px; text-align: left; max-height: 300px; overflow-y: auto; margin: 20px auto; max-width: 500px; font-family: monospace; font-size: 12px; border: 1px solid #38444d; }
        .btn { background: #1da1f2; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <h2>スプレッドシート清掃・データ移行</h2>
    <p>このボタンを押すと、シート内の[SEP]データを掃除し、<br>名前と日時をブラウザの保存領域へ移動します。</p>
    
    <button id="startBtn" class="btn" onclick="startCleanup()">掃除と移行を開始する</button>
    
    <div id="log" class="log-box">待機中...</div>

<script>
    const apiURL = 'https://script.google.com/macros/s/AKfycbwNMIqyjChPN5ckansj4zEcv-fEF9G6jnIOrdopZTCLOMMSRH5pZTEpS4U7-7-IJG2s/exec';
    const SEP = '[SEP]';
    let db;

    // ブラウザの保存領域(IndexedDB)を準備
    const request = indexedDB.open("AdminDB", 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore("meta", { keyPath: "url" });
    request.onsuccess = e => { db = e.target.result; };

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<div>${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    async function startCleanup() {
        const btn = document.getElementById('startBtn');
        btn.classList.add('loading');
        btn.innerText = "実行中...";
        addLog("クラウドからデータを取得中...");

        try {
            const res = await fetch(`${apiURL}?action=getReports`);
            const data = await res.json();
            
            const tx = db.transaction("meta", "readwrite");
            const store = tx.objectStore("meta");

            for (const raw of data) {
                if (raw.includes(SEP)) {
                    const parts = raw.split(SEP);
                    const url = parts[0];
                    const name = parts[1];
                    const id = parts[2];
                    const time = parts[3];

                    addLog(`移行中: @${id}`);

                    // 1. ブラウザ側に名前と日時を保存
                    store.put({ url, name, id, time });

                    // 2. クラウドの汚いデータを消す
                    await fetch(`${apiURL}?action=delete&url=${encodeURIComponent(raw)}`, { mode: 'no-cors' });

                    // 3. クラウドにURLだけを入れ直す
                    await fetch(`${apiURL}?action=add&url=${encodeURIComponent(url)}`, { mode: 'no-cors' });
                }
            }
            addLog("--- すべて完了しました ---");
            alert("移行が完了しました。スプレッドシートはURLだけになりました。");
        } catch (e) {
            addLog("エラーが発生しました。");
        }
        btn.classList.remove('loading');
        btn.innerText = "完了";
    }
</script>
</body>
</html>
