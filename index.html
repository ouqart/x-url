<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通報リスト・コントローラー</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #15202b; color: white; text-align: center; }
        .nav { position: sticky; top: 0; background: #1da1f2; display: flex; justify-content: space-around; padding: 12px; z-index: 1000; }
        .nav-item { cursor: pointer; font-weight: bold; font-size: 14px; padding: 5px 15px; border-radius: 20px; }
        .nav-item.active { background: white; color: #1da1f2; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .input-card { background: #192734; padding: 20px; border-radius: 15px; border: 1px solid #38444d; margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #38444d; background: #15202b; color: white; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; font-size: 14px; transition: 0.2s; }
        .add-btn { background: #1da1f2; color: white; }
        .del-btn { background: #e0245e; color: white; margin-top: 5px; }
        .edit-btn { background: #17bf63; color: white; margin-top: 5px; }
        .report-item { background: #192734; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #38444d; text-align: left; }
        .loading { opacity: 0.5; pointer-events: none; }
        #searchBar { border: 2px solid #1da1f2; margin-bottom: 20px; }
        .edit-area { margin-top: 10px; padding-top: 10px; border-top: 1px solid #38444d; }
    </style>
</head>
<body>

<div class="nav">
    <div id="nav-add" class="nav-item active" onclick="showPage('add')">追加</div>
    <div id="nav-list" class="nav-item" onclick="showPage('list')">リスト編集・削除</div>
</div>

<div id="addPage" class="container">
    <div class="input-card">
        <input type="text" id="urlInput" placeholder="URL">
        <input type="text" id="nameInput" placeholder="ユーザー名">
        <input type="datetime-local" id="timeInput">
        <button id="addBtn" class="btn add-btn" onclick="checkAndSend()">リストに追加</button>
    </div>
</div>

<div id="listPage" class="container" style="display:none;">
    <input type="text" id="searchBar" placeholder="名前・ID検索" oninput="renderReports()">
    <div id="reportList"></div>
</div>

<script>
    const apiURL = 'https://script.google.com/macros/s/AKfycbwNMIqyjChPN5ckansj4zEcv-fEF9G6jnIOrdopZTCLOMMSRH5pZTEpS4U7-7-IJG2s/exec';
    const SEP = '[SEP]';
    let currentLinks = [];

    function showPage(page) {
        document.getElementById('addPage').style.display = page === 'add' ? 'block' : 'none';
        document.getElementById('listPage').style.display = page === 'list' ? 'block' : 'none';
        document.getElementById('nav-add').classList.toggle('active', page === 'add');
        document.getElementById('nav-list').classList.toggle('active', page === 'list');
        if(page === 'list') loadReports();
    }

    async function checkAndSend() {
        const url = document.getElementById('urlInput').value.trim();
        const name = document.getElementById('nameInput').value.trim();
        const time = document.getElementById('timeInput').value;
        const idMatch = url.match(/(?:x|twitter)\.com\/([^\/\?]+)/);
        const id = idMatch ? idMatch[1] : '不明';

        if(!url) return alert('URLなし');
        if (currentLinks.some(l => l.raw.includes(url))) return alert('重複');

        const composite = `${url}${SEP}${name}${SEP}${id}${SEP}${time}`;
        sendAction('add', composite);
    }

    async function sendAction(type, value, oldRaw = null) {
        document.body.classList.add('loading');
        try {
            // 編集の場合は、古いデータを消してから新しいデータを追加する
            if(type === 'update' && oldRaw) {
                await fetch(`${apiURL}?action=delete&url=${encodeURIComponent(oldRaw)}`, { mode: 'no-cors' });
                await fetch(`${apiURL}?action=add&url=${encodeURIComponent(value)}`, { mode: 'no-cors' });
            } else {
                await fetch(`${apiURL}?action=${type}&url=${encodeURIComponent(value)}`, { mode: 'no-cors' });
            }
            if(type !== 'get') {
                alert('完了');
                ["urlInput","nameInput","timeInput"].forEach(i => document.getElementById(i).value = "");
                loadReports();
            }
        } catch (e) { alert('エラー'); }
        document.body.classList.remove('loading');
    }

    async function loadReports() {
        const res = await fetch(`${apiURL}?action=getReports`);
        const data = await res.json();
        
        currentLinks = data.map((raw, index) => {
            const parts = raw.split(SEP);
            const idMatch = raw.match(/(?:x|twitter)\.com\/([^\/\?]+)/);
            return {
                raw: raw,
                index: index,
                url: parts[0] || raw,
                name: parts[1] || '',
                id: parts[2] || (idMatch ? idMatch[1] : '不明'),
                time: parts[3] || ''
            };
        });

        currentLinks.sort((a, b) => {
            if (a.time && b.time) return b.time.localeCompare(a.time);
            return b.index - a.index;
        });

        renderReports();
    }

    function renderReports() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const listDiv = document.getElementById('reportList');
        listDiv.innerHTML = '';

        currentLinks.forEach(d => {
            if (!d.name.toLowerCase().includes(query) && !d.id.toLowerCase().includes(query)) return;

            const item = document.createElement('div');
            item.className = 'report-item';
            item.innerHTML = `
                <div style="font-size:11px; color:#8899a6; margin-bottom:5px;">ID: @${d.id} | ${d.time || '日時不明'}</div>
                <div style="font-size:14px; margin-bottom:10px; word-break:break-all;">${d.url}</div>
                <div class="edit-area">
                    <input type="text" value="${d.name}" placeholder="ユーザー名" id="editName-${d.index}">
                    <input type="datetime-local" value="${d.time}" id="editTime-${d.index}">
                    <button class="btn edit-btn" onclick="updateItem(${d.index})">保存</button>
                    <button class="btn del-btn" onclick="sendAction('delete', '${d.raw.replace(/'/g, "\\'")}')">削除</button>
                </div>
            `;
            listDiv.appendChild(item);
        });
    }

    function updateItem(index) {
        const item = currentLinks.find(l => l.index === index);
        const newName = document.getElementById(`editName-${index}`).value;
        const newTime = document.getElementById(`editTime-${index}`).value;
        const newRaw = `${item.url}${SEP}${newName}${SEP}${item.id}${SEP}${newTime}`;
        sendAction('update', newRaw, item.raw);
    }

    loadReports();
</script>
</body>
</html>
