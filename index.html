<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通報リスト・コントローラー</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #15202b; color: white; text-align: center; }
        .nav { position: sticky; top: 0; background: #1da1f2; display: flex; justify-content: space-around; padding: 12px; z-index: 1000; }
        .nav-item { cursor: pointer; font-weight: bold; font-size: 14px; padding: 5px 15px; border-radius: 20px; }
        .nav-item.active { background: white; color: #1da1f2; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .input-card { background: #192734; padding: 20px; border-radius: 15px; border: 1px solid #38444d; margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #38444d; background: #15202b; color: white; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .add-btn { background: #1da1f2; color: white; }
        .del-btn { background: #e0245e; color: white; }
        .report-item { background: #192734; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #38444d; text-align: left; }
        .loading { opacity: 0.5; pointer-events: none; }
        #searchBar { border: 2px solid #1da1f2; margin-bottom: 20px; }
        .user-badge { background: #38444d; padding: 2px 8px; border-radius: 5px; font-size: 12px; color: #1da1f2; margin-right: 5px; }
    </style>
</head>
<body>

<div class="nav">
    <div id="nav-add" class="nav-item active" onclick="showPage('add')">追加</div>
    <div id="nav-list" class="nav-item" onclick="showPage('list')">削除・検索</div>
</div>

<div id="addPage" class="container">
    <div class="input-card">
        <input type="text" id="urlInput" placeholder="URLを貼り付け">
        <input type="text" id="nameInput" placeholder="表示名 (任意)">
        <input type="datetime-local" id="timeInput">
        <button id="addBtn" class="btn add-btn" onclick="checkAndSend()">通報リストに追加</button>
    </div>
</div>

<div id="listPage" class="container" style="display:none;">
    <input type="text" id="searchBar" placeholder="名前やIDで検索..." oninput="renderReports()">
    <div id="reportList">読み込み中...</div>
</div>

<script>
    const apiURL = 'https://script.google.com/macros/s/AKfycbwNMIqyjChPN5ckansj4zEcv-fEF9G6jnIOrdopZTCLOMMSRH5pZTEpS4U7-7-IJG2s/exec';
    const SEP = '[SEP]';
    let currentLinks = [];

    function showPage(page) {
        document.getElementById('addPage').style.display = page === 'add' ? 'block' : 'none';
        document.getElementById('listPage').style.display = page === 'list' ? 'block' : 'none';
        document.getElementById('nav-add').classList.toggle('active', page === 'add');
        document.getElementById('nav-list').classList.toggle('active', page === 'list');
        if(page === 'list') loadReports();
    }

    async function checkAndSend() {
        const url = document.getElementById('urlInput').value.trim();
        const name = document.getElementById('nameInput').value.trim() || '未設定';
        const time = document.getElementById('timeInput').value || '';
        
        // IDはURLから自動抽出
        const idMatch = url.match(/(?:x|twitter)\.com\/([^\/\?]+)/);
        const id = idMatch ? idMatch[1] : '不明';

        if(!url) return alert('URLを入力してください');
        if (currentLinks.some(link => link.includes(url))) return alert('既に追加済み');

        const composite = `${url}${SEP}${name}${SEP}${id}${SEP}${time}`;
        sendAction('add', composite);
    }

    async function sendAction(type, value) {
        document.body.classList.add('loading');
        try {
            await fetch(`${apiURL}?action=${type}&url=${encodeURIComponent(value)}`, { mode: 'no-cors' });
            alert('完了');
            if(type === 'add') ["urlInput","nameInput","timeInput"].forEach(i => document.getElementById(i).value = "");
            loadReports();
        } catch (e) { alert('エラー'); }
        document.body.classList.remove('loading');
    }

    async function loadReports() {
        try {
            const res = await fetch(`${apiURL}?action=getReports`);
            const data = await res.json();
            
            // データをオブジェクト化してソート
            const parsed = data.map((raw, index) => {
                const parts = raw.split(SEP);
                const idMatch = raw.match(/(?:x|twitter)\.com\/([^\/\?]+)/);
                return {
                    raw: raw,
                    index: index, // 元々の登録順（日時がない場合のバックアップ）
                    url: parts[0] || raw,
                    name: parts[1] || '-',
                    id: parts[2] || (idMatch ? idMatch[1] : '?'),
                    time: parts[3] || ''
                };
            });

            // ソートロジック: 日時の降順 > 登録順(index)の降順
            parsed.sort((a, b) => {
                if (a.time && b.time) return b.time.localeCompare(a.time);
                if (a.time && !b.time) return -1;
                if (!a.time && b.time) return 1;
                return b.index - a.index;
            });

            currentLinks = parsed;
            renderReports();
        } catch (e) { document.getElementById('reportList').innerHTML = '読込失敗'; }
    }

    function renderReports() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const listDiv = document.getElementById('reportList');
        listDiv.innerHTML = '';

        currentLinks.forEach(d => {
            if (!d.name.toLowerCase().includes(query) && !d.id.toLowerCase().includes(query)) return;

            const item = document.createElement('div');
            item.className = 'report-item';
            item.innerHTML = `
                <div style="font-size:11px; color:#8899a6; margin-bottom:5px;">${d.time ? '投稿日: ' + d.time : '登録順'}</div>
                <div style="margin-bottom:8px;">
                    <span class="user-badge">${d.name}</span>
                    <span style="color:#1da1f2; font-size:14px;">@${d.id}</span>
                </div>
                <div style="font-size:12px; color:#8899a6; margin-bottom:10px; word-break:break-all;">${d.url}</div>
                <button class="btn del-btn" style="padding:8px; font-size:12px; width:auto;" onclick="sendAction('delete', '${d.raw.replace(/'/g, "\\'")}')">削除</button>
            `;
            listDiv.appendChild(item);
        });
    }

    loadReports();
</script>
</body>
</html>
